//LibreWolf specific preferences
//this needs a few comments

//template:
//defaultPref("", );

//Browser Behavior
//Update add-ons automatically:
defaultPref("extensions.update.autoUpdateDefault", true);
defaultPref("extensions.update.enabled", true);

defaultPref("identity.fxaccounts.enabled", false);
defaultPref("clipboard.autocopy", false);
defaultPref("middlemouse.paste", false);
defaultPref("toolkit.legacyUserProfileCustomizations.stylesheets", false);

//Networking
defaultPref("network.dns.disableIPv6", false);

//Fingerprinting
defaultPref("privacy.resistFingerprinting", true);
defaultPref("privacy.resistFingerprinting.letterboxing", false);
defaultPref("privacy.resistFingerprinting.autoDeclineNoUserInputCanvasPrompts", true);
defaultPref("webgl.disabled", false);

//Security
defaultPref("security.OCSP.require", true);

defaultPref("browser.safebrowsing.malware.enabled", false);
defaultPref("browser.safebrowsing.phishing.enabled", false);
defaultPref("browser.safebrowsing.blockedURIs.enabled", false);
